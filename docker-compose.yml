services:
  postgres:
    image: postgres:12.2-alpine
    environment:
      - POSTGRES_DB=nakama
      - POSTGRES_PASSWORD=localdb
    expose:
      - "5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  nakama:
    image: heroiclabs/nakama:3.15.0
    entrypoint:
      - /bin/sh
      - -ec
      - >
        /nakama/nakama migrate up --database.address postgres:localdb@postgres:5432/nakama &&
        /nakama/nakama 
        --config /nakama/data/local.yml 
        --database.address postgres:localdb@postgres:5432/nakama
        --runtime.env "HF_TOKEN=$${HF_TOKEN}"
        --runtime.env "HF_MODEL=$${HF_MODEL}"
    restart: always
    depends_on:
      - postgres
    volumes:
      - ./backend/build:/nakama/data/modules/build
      - ./local.yml:/nakama/data/local.yml
    ports:
      - "7349:7349"
      - "7350:7350"
      - "7351:7351"
    env_file:
      - .env

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - .env
    depends_on:
      - nakama

volumes:
  pgdata: