services:
  postgres:
    image: postgres:12.2-alpine
    environment:
      - POSTGRES_DB=nakama
      - POSTGRES_PASSWORD=localdb
    expose:
      - "5432"
    ports:
      - "5432:5432"

  nakama:
    image: heroiclabs/nakama:3.15.0
    entrypoint:
      - /bin/sh
      - -ec
      - >
        /nakama/nakama migrate up --database.address postgres:localdb@postgres:5432/nakama &&
        /nakama/nakama --config /nakama/data/local.yml --database.address postgres:localdb@postgres:5432/nakama
    restart: always
    links:
      - postgres
    depends_on:
      - postgres
    volumes:
      - ./backend/build:/nakama/data/modules/build
      - ./local.yml:/nakama/data/local.yml
    ports:
      - "7349:7349"
      - "7350:7350"
      - "7351:7351"