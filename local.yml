name: nakama

logger:
  level: "info"
  stdout: true

database:
  addresses:
    - "ep-morning-boat-anm37grk-pooler.c-6.us-east-1.aws.neon.tech:5432/neondb?sslmode=require&options=endpoint%3Dep-morning-boat-anm37grk-pooler"
  ssl_mode: "require"
  max_open_conns: 10
  max_idle_conns: 100
  conn_max_lifetime_ms: 3600000

console:
  port: 7351

socket:
  server_key: "defaultkey"
  port: 7350

runtime:
  http_key: "defaultkey"
  js_entrypoint: "build/main.js"
  env: []

session:
  token_expiry_sec: 7200
  refresh_expiry_sec: 86400

# CORS configuration
cors:
  allowed_origins:
    - "http://localhost:3000"
    - "http://127.0.0.1:3000"
    - "https://multiplayertictactoefrontend.onrender.com"
  allowed_methods:
    - "GET"
    - "POST"
    - "PUT"
    - "DELETE"
    - "OPTIONS"
  allowed_headers:
    - "*"
  exposed_headers:
    - "*"
  allow_credentials: true